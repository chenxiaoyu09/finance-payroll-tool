version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: finance-payroll-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: finance_payroll_dev
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: finance-payroll-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  server:
    build:
      context: ./apps/server
    container_name: finance-payroll-server
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: mysql://root:123456@mysql:3306/finance_payroll_dev
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      - mysql
      - redis

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: http://127.0.0.1:3000/api
    container_name: finance-payroll-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  mysql_data:
