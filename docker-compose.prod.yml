version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: finance-payroll-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - payroll_net

  redis:
    image: redis:7-alpine
    container_name: finance-payroll-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - payroll_net

  server:
    build:
      context: ./apps/server
    container_name: finance-payroll-server
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      APP_HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    volumes:
      - server_uploads:/app/uploads
    expose:
      - '3000'
    networks:
      - payroll_net

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: finance-payroll-web
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - '80'
    networks:
      - payroll_net

  nginx:
    image: nginx:1.27-alpine
    container_name: finance-payroll-nginx
    restart: unless-stopped
    depends_on:
      - web
      - server
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/payroll.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - payroll_net

volumes:
  mysql_data:
  redis_data:
  server_uploads:

networks:
  payroll_net:
